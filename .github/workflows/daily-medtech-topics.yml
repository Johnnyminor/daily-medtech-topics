name: Daily MedTech Topics from FDA RSS

on:
  schedule:
    - cron: '13 8 * * *'  # Daily at 08:13 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  generate-topics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai

      - name: Run topic generation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_medtech_topics.py

      - name: Create GitHub issue with topics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const topics = fs.readFileSync('daily_topics.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily MedTech Content Topics - ${new Date().toISOString().split('T')[0]}`,
              body: topics,
              labels: ['automation', 'content-topics']
            });
